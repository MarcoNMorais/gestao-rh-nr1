<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Gestão RH Consultoria | Gestão de Pessoas e Soluções em RH</title>
<style>
:root{--blue:#173f9f;--blue2:#246de8;--cyan:#07a9e8;--navy:#0c2260;--soft:#f4f8ff;--line:#dce7fb;--text:#12204a;--muted:#66759b;--green:#0cb36b;--orange:#ff7a1a;--red:#e93a59;--purple:#6236d8;--card:#fff;--shadow:0 18px 50px rgba(12,34,96,.11);--radius:24px}*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#f8fbff,#edf6ff 45%,#f7f9ff);color:var(--text)}button,input,select,textarea{font-family:inherit}button{cursor:pointer;border:0}.hide{display:none!important}.app{min-height:100vh}.brand{display:flex;align-items:center;gap:12px}.brand img{width:58px;height:58px;object-fit:contain}.brand b{font-size:19px;letter-spacing:.2px}.brand span{display:block;font-size:13px;color:#0e8dcc;font-weight:800}.top{height:82px;display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:rgba(255,255,255,.78);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}.pill{padding:10px 14px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--navy);font-weight:800;box-shadow:0 8px 22px rgba(12,34,96,.05)}.layout{display:grid;grid-template-columns:286px 1fr;min-height:calc(100vh - 82px)}.side{padding:24px 20px;border-right:1px solid var(--line);background:rgba(255,255,255,.72)}.nav button{width:100%;display:flex;gap:12px;align-items:center;text-align:left;margin-bottom:10px;padding:15px 16px;border-radius:15px;background:transparent;color:#30416f;font-weight:800}.nav button.active,.nav button:hover{background:linear-gradient(135deg,var(--blue),#235bd5);color:#fff;box-shadow:0 12px 25px rgba(31,86,207,.25)}.sidecard{margin-top:28px;border-radius:22px;padding:20px;color:#fff;background:linear-gradient(135deg,var(--blue),var(--cyan));box-shadow:var(--shadow);position:relative;overflow:hidden}.sidecard:after{content:"";position:absolute;width:180px;height:180px;border-radius:999px;background:rgba(255,255,255,.17);right:-70px;bottom:-70px}.main{padding:28px;max-width:1500px;width:100%;margin:auto}.hero{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:22px}.hero h1{margin:0;font-size:31px;color:var(--navy)}.hero p{margin:7px 0 0;color:var(--muted);font-weight:600}.grid{display:grid;gap:18px}.kpis{grid-template-columns:repeat(5,minmax(160px,1fr))}.card{background:rgba(255,255,255,.86);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px}.kpi{display:flex;gap:14px;align-items:center}.ico{width:54px;height:54px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,#e7f5ff,#dce7ff);font-size:25px;color:var(--blue)}.kpi small{color:var(--muted);font-weight:800}.kpi strong{font-size:31px;color:var(--blue);display:block}.dashgrid{grid-template-columns:1.05fr 1.35fr 1.25fr;align-items:stretch}.sectiontitle{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}.sectiontitle h2{font-size:18px;margin:0;color:var(--navy)}.gauge{width:250px;height:250px;border-radius:999px;margin:15px auto;display:grid;place-items:center;background:conic-gradient(var(--cyan) 0 var(--deg,280deg),#edf1f8 0 360deg);position:relative}.gauge:after{content:"";position:absolute;inset:22px;border-radius:inherit;background:#fff}.gauge div{position:relative;z-index:1;text-align:center}.gauge b{font-size:58px;color:var(--navy)}.gauge span{display:block;color:var(--green);font-size:20px;font-weight:900}.btn{border-radius:14px;padding:13px 18px;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;font-weight:900;box-shadow:0 12px 23px rgba(31,86,207,.22)}.btn.secondary{background:#fff;color:var(--blue);border:1px solid var(--line);box-shadow:none}.btn.danger{background:linear-gradient(135deg,#d72d50,#ff6b48)}.btn.green{background:linear-gradient(135deg,#00a770,#0bd2a7)}.formgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}label{font-size:12px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.6px}input,select,textarea{width:100%;margin-top:7px;border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff;color:var(--text);outline:none}textarea{min-height:90px}.companylist{display:grid;gap:14px}.company{border:1px solid var(--line);border-radius:18px;padding:16px;background:#fff}.company h3{margin:0 0 5px}.links{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.linkbox{background:#f6f9ff;border:1px solid var(--line);border-radius:14px;padding:12px;word-break:break-all;font-size:12px;color:#30416f}.linkbox b{display:block;margin-bottom:5px;color:var(--blue)}.chartbar{height:12px;border-radius:999px;background:#edf1f8;overflow:hidden}.chartbar i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));width:50%}.radar{min-height:255px;display:grid;place-items:center}.radar svg{width:100%;max-width:380px}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:12px;border-bottom:1px solid var(--line);font-size:13px;text-align:left}.table th{color:var(--muted);font-size:11px;text-transform:uppercase}.status{padding:7px 10px;border-radius:999px;background:#eaf3ff;color:var(--blue);font-weight:900;font-size:12px;display:inline-block}.heat{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin:14px 0}.heat div{height:70px;border-radius:12px;display:grid;place-items:center;color:#fff;font-weight:900}.h1{background:#2abb87}.h2{background:#ead85d}.h3{background:#ffad43}.h4{background:#ff744d}.h5{background:#e93a59}.question{padding:18px;border:1px solid var(--line);border-radius:18px;background:#fff;margin-bottom:14px}.question h3{margin:0 0 8px;font-size:16px}.scale{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.scale label{cursor:pointer;text-transform:none;letter-spacing:0;font-size:12px;color:#30416f;background:#f4f8ff;border:1px solid var(--line);border-radius:13px;padding:10px;text-align:center}.scale input{display:none}.scale label:has(input:checked){background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;border-color:transparent}.fullpage{min-height:100vh;display:grid;place-items:center;padding:22px;background:radial-gradient(circle at top left,#dff6ff,transparent 38%),linear-gradient(135deg,#f7fbff,#eef6ff)}.formwrap{width:min(840px,100%)}.thanks{text-align:center;padding:60px}.cert{border:2px solid #dbe9ff;background:linear-gradient(135deg,#fff,#f4fbff);border-radius:24px;text-align:center;padding:24px}.seal{width:140px;height:140px;border-radius:999px;border:7px solid #d5e9ff;margin:0 auto 10px;display:grid;place-items:center;background:#fff;box-shadow:var(--shadow)}.seal img{width:86px}.footerbar{margin-top:18px;border-radius:22px;padding:22px;background:linear-gradient(135deg,var(--blue),#3029a8);color:#fff;display:flex;justify-content:space-between;gap:20px;align-items:center}.small{font-size:12px;color:var(--muted)}
.landing{min-height:100vh;overflow:hidden;background:radial-gradient(circle at 12% 12%,rgba(7,169,232,.22),transparent 28%),radial-gradient(circle at 86% 20%,rgba(23,63,159,.18),transparent 30%),linear-gradient(135deg,#f8fbff 0%,#eef7ff 55%,#ffffff 100%)}
.landing .top{position:relative;background:rgba(255,255,255,.68)}
.landingHero{max-width:1220px;margin:0 auto;padding:70px 24px 36px;display:grid;grid-template-columns:1.1fr .9fr;gap:34px;align-items:center}
.landingHero h1{font-size:clamp(36px,5.4vw,72px);line-height:.98;margin:18px 0;color:var(--navy);letter-spacing:-2px}
.landingHero p{font-size:18px;line-height:1.65;color:#4c5c88;font-weight:650;margin:0 0 26px}.landingBadge{display:inline-flex;align-items:center;gap:8px;padding:9px 13px;border-radius:999px;background:#fff;border:1px solid var(--line);box-shadow:0 10px 25px rgba(12,34,96,.08);font-weight:900;color:var(--blue)}
.landingActions{display:flex;gap:12px;flex-wrap:wrap;margin:25px 0}.landingActions .btn{font-size:16px;padding:15px 22px}.mock{position:relative;border-radius:32px;background:rgba(255,255,255,.82);border:1px solid var(--line);box-shadow:0 30px 80px rgba(12,34,96,.18);padding:22px;overflow:hidden}.mock:before{content:"";position:absolute;inset:-80px -90px auto auto;width:250px;height:250px;border-radius:999px;background:linear-gradient(135deg,var(--cyan),var(--blue));opacity:.14}.mockHeader{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.mockScore{width:170px;height:170px;border-radius:999px;margin:22px auto;display:grid;place-items:center;background:conic-gradient(var(--cyan) 0 286deg,#e7eefb 0 360deg);position:relative}.mockScore:after{content:"";position:absolute;inset:17px;background:#fff;border-radius:inherit}.mockScore div{position:relative;z-index:1;text-align:center}.mockScore b{font-size:43px;color:var(--navy)}.miniBars{display:grid;gap:10px}.miniBars span{display:block;height:11px;border-radius:999px;background:#edf3fb;overflow:hidden}.miniBars i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:999px}.landingCards{max-width:1220px;margin:0 auto;padding:8px 24px 70px;display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.landingCards .card h3{margin:0 0 8px;color:var(--navy)}.landingCards .card p{margin:0;color:var(--muted);line-height:1.5;font-weight:650}.loginHint{margin-top:18px;color:var(--muted);font-size:12px}.loginBack{position:absolute;left:22px;top:22px}.adminLoginCard{width:min(460px,100%);text-align:center;position:relative}
@media(max-width:900px){.landingHero,.landingCards{grid-template-columns:1fr}.landingHero{padding-top:42px}.mock{order:-1}.landing .top{align-items:flex-start;gap:12px;flex-direction:column}}

@media(max-width:1050px){.layout{grid-template-columns:1fr}.side{display:none}.kpis,.dashgrid,.formgrid,.links{grid-template-columns:1fr}.top{height:auto}.hero,.footerbar{flex-direction:column;align-items:flex-start}.main{padding:18px}.brand img{width:48px;height:48px}}
@media print{.top,.side,.btn,.footerbar{display:none!important}.layout{display:block}.main{padding:0}.card{box-shadow:none;break-inside:avoid}}
</style>

 {dim:'Carga de trabalho',text:'Tenho volume de trabalho compatível com o tempo disponível.',direction:'positive'},
 {dim:'Jornada',text:'Minha jornada permite descanso e recuperação adequados.',direction:'positive'},
 {dim:'Liderança',text:'Recebo orientação clara, respeito e apoio da liderança.',direction:'positive'},

];

function adminHeaders(extra={}){ const t=localStorage.getItem(ADMIN_TOKEN_KEY); return {'Content-Type':'application/json', ...(t?{'X-Admin-Token':t}:{}), ...extra}; }

async function adminLogin(){ const password=document.querySelector('#adminPass')?.value||''; try{ const r=await fetch('/api/admin-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password})}); const j=await r.json().catch(()=>({})); if(!r.ok) throw new Error(j.error||'Senha incorreta'); localStorage.setItem(ADMIN_TOKEN_KEY,j.token); history.replaceState(null,'','/admin'); route(); }catch(e){ alert(e.message); } }
function adminLogout(){ localStorage.removeItem(ADMIN_TOKEN_KEY); if(location.protocol==='file:'){ renderLanding(); } else { history.replaceState(null,'','/'); renderLanding(); } }
function goAdmin(){ if(location.protocol==='file:'){ renderLogin(); alert('Prévia local: a tela de login abriu, mas as funções do sistema só funcionam online no Render ou rodando npm start.'); } else { location.href='/admin'; } }

function qScore(val, q){ const v=Number(val)||0; if(q?.direction==='negative') return Math.round((6-v)/5*100); return Math.round(v/5*100); }
function scoreResponses(responses, questionSet){
 const qs=questionSet?.questions||DEFAULT_QUESTIONS; if(!responses.length) return {score:0,dims:{},risk:'Sem dados'};
 const dims={}; qs.forEach(q=>dims[q.dim]=[]);
 responses.forEach(r=>{(r.answers||[]).forEach((a,i)=>{const q=qs[i]; if(q) dims[q.dim].push(qScore(a,q));})});
 const dimScores={}; Object.keys(dims).forEach(k=>{const arr=dims[k]; dimScores[k]=arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):0;});
 const vals=Object.values(dimScores).filter(v=>!isNaN(v)); const score=vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0;
 return {score,dims:dimScores,risk:score>=80?'Baixo':score>=60?'Moderado':score>=40?'Alto':'Crítico'};
}
function maturity(score){ if(score>=90)return 'Diamante'; if(score>=80)return 'Ouro'; if(score>=65)return 'Prata'; if(score>=50)return 'Bronze'; return 'Alerta Vermelho'; }
async function getActiveQS(){ if(ACTIVE_QS) return ACTIVE_QS; ACTIVE_QS=await api('/api/question-set/active'); return ACTIVE_QS; }
async function renderAdmin(){ shell(`<div class="hero"><div><h1>Olá, Gestão RH! 👋</h1><p>Administre empresas, links, questionários versionados e dashboards privados.</p></div><button class="btn" onclick="showCompanies()">+ Cadastrar empresa</button></div><div id="adminContent"></div>`); showAdminDash(); }
async function showAdminDash(){
 const companies=await api('/api/companies'); const responses=await api('/api/responses'); const qs=await getActiveQS();
 $('#main').innerHTML=`<div class="hero"><div><h1>Visão Geral</h1><p>Resumo dos clientes e versão atual do questionário.</p></div><button class="btn secondary" onclick="showQuestions()">Editar perguntas</button></div><div class="grid kpis"><div class="card kpi"><div class="ico">🏢</div><div><small>Empresas</small><strong>${companies.length}</strong></div></div><div class="card kpi"><div class="ico">📝</div><div><small>Respostas</small><strong>${responses.length}</strong></div></div><div class="card kpi"><div class="ico">🔒</div><div><small>Questionário atual</small><strong>v${qs.version}</strong></div></div><div class="card kpi"><div class="ico">❓</div><div><small>Perguntas atuais</small><strong>${qs.questions.length}</strong></div></div><div class="card kpi"><div class="ico">🏅</div><div><small>Produto</small><strong>NR-1</strong></div></div></div><div class="card" style="margin-top:18px"><div class="sectiontitle"><h2>Clientes recentes</h2><button class="btn secondary" onclick="showCompanies()">Ver links</button></div><table class="table"><thead><tr><th>Empresa</th><th>Versão das perguntas</th><th>Respostas</th><th>Dashboard</th></tr></thead><tbody>${companies.map(c=>`<tr><td><b>${esc(c.name)}</b><br><span class="small">${esc(c.segment||'')}</span></td><td>${esc(c.questionSetId||'-')}</td><td>${responses.filter(r=>r.companyId===c.id).length}</td><td><button class="btn secondary" onclick="location.href='/d/${c.dashToken}'">Abrir</button></td></tr>`).join('')||'<tr><td colspan="4">Nenhuma empresa cadastrada ainda.</td></tr>'}</tbody></table></div>`;
}
async function showCompanies(){
 const companies=await api('/api/companies'); const base=await networkOrigin(); const qs=await getActiveQS();
 shell('', 'empresas');
 $('#main').innerHTML=`<div class="hero"><div><h1>Empresas e links exclusivos</h1><p>Cada empresa criada recebe uma cópia travada do questionário atual.</p><p class="small">Questionário usado em novas empresas: <b>v${qs.version}</b> • ${qs.questions.length} perguntas. Links gerados com o endereço público do site: <b>${base}</b></p></div></div><div class="card"><div class="sectiontitle"><h2>Cadastrar empresa cliente</h2><span class="status">Usará perguntas v${qs.version}</span></div><div class="formgrid"><div><label>Nome da empresa</label><input id="cname" placeholder="Ex: Empresa X LTDA"></div><div><label>CNPJ</label><input id="ccnpj" placeholder="Opcional"></div><div><label>Segmento</label><input id="cseg" placeholder="Ex: Comércio, Saúde, Indústria"></div><div><label>Cidade/UF</label><input id="ccity" placeholder="Ex: Salvador/BA"></div><div><label>Nº de colaboradores</label><input id="cemp" placeholder="Ex: 120"></div><div style="display:flex;align-items:end"><button class="btn" onclick="createCompany()">Gerar links da empresa</button></div></div></div><div class="companylist" style="margin-top:18px">${companies.map(c=>companyCard(c,base)).join('')||'<div class="card">Cadastre a primeira empresa para gerar os links.</div>'}</div>`;
}
function companyCard(c,base){ const fl=`${base}/f/${c.formToken}`, dl=`${base}/d/${c.dashToken}`; return `<div class="company"><h3>${esc(c.name)}</h3><span class="small">${esc(c.segment||'Segmento não informado')} • ${esc(c.city||'')} • Questionário travado: ${esc(c.questionSetId||'-')}</span><div class="links"><div class="linkbox"><b>Link dos funcionários - só formulário</b>${fl}<br><br><button class="btn secondary" onclick="copy('${fl}')">Copiar link</button> <button class="btn secondary" onclick="location.href='/f/${c.formToken}'">Testar</button></div><div class="linkbox"><b>Link do patrão/gestor - só dashboard</b>${dl}<br><br><button class="btn secondary" onclick="copy('${dl}')">Copiar link</button> <button class="btn secondary" onclick="location.href='/d/${c.dashToken}'">Abrir</button></div></div></div>`; }
async function createCompany(){ try{await api('/api/companies',{method:'POST',body:JSON.stringify({name:$('#cname').value,cnpj:$('#ccnpj').value,segment:$('#cseg').value,city:$('#ccity').value,employees:$('#cemp').value})}); alert('Empresa cadastrada! Os links ficaram presos à versão atual das perguntas.'); showCompanies();}catch(e){alert(e.message)} }
async function showQuestions(){
 shell('', 'perguntas'); const data=await api('/api/question-sets'); const active=data.questionSets.find(q=>q.id===data.activeQuestionSetId)||data.questionSets.at(-1); ACTIVE_QS=active;
 $('#main').innerHTML=`<div class="hero"><div><h1>Perguntas do formulário</h1><p>Ao salvar alterações, o sistema cria uma NOVA versão. Links antigos continuam com as perguntas antigas.</p></div><span class="pill">Versão atual: v${active.version}</span></div><div class="card"><div class="sectiontitle"><h2>Editar perguntas para próximos links</h2><button class="btn secondary" onclick="addQuestion()">+ Pergunta</button></div><p class="small"><b>Importante:</b> salvar aqui não mexe nas empresas já criadas. Só novas empresas/links usarão a nova versão.</p><div id="qEditor">${active.questions.map((q,i)=>qRow(q,i)).join('')}</div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px"><button class="btn green" onclick="saveQuestionSet()">Salvar como nova versão</button><button class="btn secondary" onclick="restoreDefaultQuestions()">Restaurar padrão NR-1</button></div></div><div class="card" style="margin-top:18px"><div class="sectiontitle"><h2>Histórico de versões</h2></div><table class="table"><thead><tr><th>Versão</th><th>Data</th><th>Perguntas</th><th>Status</th></tr></thead><tbody>${data.questionSets.slice().reverse().map(q=>`<tr><td>v${q.version}</td><td>${new Date(q.createdAt).toLocaleString('pt-BR')}</td><td>${q.questions.length}</td><td>${q.id===data.activeQuestionSetId?'<span class="status">Atual</span>':'Arquivada'}</td></tr>`).join('')}</tbody></table></div>`;
}
function qRow(q,i){return `<div class="question qedit"><div class="formgrid"><div><label>Dimensão</label><input class="qdim" value="${esc(q.dim)}" placeholder="Ex: Liderança"></div><div><label>Tipo da nota</label><select class="qdir"><option value="positive" ${q.direction!=='negative'?'selected':''}>Positiva: quanto maior, melhor</option><option value="negative" ${q.direction==='negative'?'selected':''}>Risco: quanto maior, pior</option></select></div></div><label>Pergunta</label><textarea class="qtext" placeholder="Digite a pergunta">${esc(q.text)}</textarea><button class="btn danger" onclick="this.closest('.qedit').remove()">Remover</button></div>`}
function addQuestion(){ $('#qEditor').insertAdjacentHTML('beforeend', qRow({dim:'Geral',text:'',direction:'positive'},0)); }
function restoreDefaultQuestions(){ if(confirm('Substituir o editor pelo questionário padrão? Só vira oficial quando salvar.')) $('#qEditor').innerHTML=DEFAULT_QUESTIONS.map(q=>qRow(q,0)).join(''); }
async function saveQuestionSet(){
 const rows=[...document.querySelectorAll('.qedit')]; const questions=rows.map(r=>({dim:r.querySelector('.qdim').value.trim()||'Geral', text:r.querySelector('.qtext').value.trim(), direction:r.querySelector('.qdir').value})).filter(q=>q.text.length>3);
 if(questions.length<3) return alert('Cadastre pelo menos 3 perguntas.');
 if(!confirm('Salvar como NOVA versão? Empresas e links antigos continuarão sem alteração.')) return;
 try{ACTIVE_QS=null; const qs=await api('/api/question-sets',{method:'POST',body:JSON.stringify({questions})}); alert(`Nova versão criada: v${qs.version}. Novas empresas usarão essas perguntas.`); showQuestions();}catch(e){alert(e.message)}
}
async function showResponses(){
 shell('', 'respostas'); const companies=await api('/api/companies'); const responses=await api('/api/responses');
 $('#main').innerHTML=`<div class="hero"><div><h1>Respostas recebidas</h1><p>Lista administrativa de respostas anônimas.</p></div></div><div class="card"><table class="table"><thead><tr><th>Data</th><th>Empresa</th><th>Setor</th><th>Modalidade</th><th>Versão</th><th>Média bruta</th></tr></thead><tbody>${responses.slice().reverse().map(r=>{const c=companies.find(x=>x.id===r.companyId)||{}; const avg=Math.round((r.answers||[]).reduce((a,b)=>a+Number(b),0)/(r.answers?.length||1)/5*100); return `<tr><td>${new Date(r.createdAt).toLocaleString('pt-BR')}</td><td>${esc(c.name||'-')}</td><td>${esc(r.sector)}</td><td>${esc(r.workMode)}</td><td>${esc(r.questionSetId||c.questionSetId||'-')}</td><td>${avg}%</td></tr>`}).join('')||'<tr><td colspan="6">Nenhuma resposta ainda.</td></tr>'}</tbody></table></div>`;
}
