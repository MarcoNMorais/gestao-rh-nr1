<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Gestão RH Consultoria | Plataforma NR-1</title>
<style>
:root{--blue:#173f9f;--blue2:#246de8;--cyan:#07a9e8;--navy:#0c2260;--soft:#f4f8ff;--line:#dce7fb;--text:#12204a;--muted:#66759b;--green:#0cb36b;--orange:#ff7a1a;--red:#e93a59;--purple:#6236d8;--card:#fff;--shadow:0 18px 50px rgba(12,34,96,.11);--radius:24px}*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#f8fbff,#edf6ff 45%,#f7f9ff);color:var(--text)}button,input,select,textarea{font-family:inherit}button{cursor:pointer;border:0}.hide{display:none!important}.app{min-height:100vh}.brand{display:flex;align-items:center;gap:12px}.brand img{width:58px;height:58px;object-fit:contain}.brand b{font-size:19px;letter-spacing:.2px}.brand span{display:block;font-size:13px;color:#0e8dcc;font-weight:800}.top{height:82px;display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:rgba(255,255,255,.78);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}.pill{padding:10px 14px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--navy);font-weight:800;box-shadow:0 8px 22px rgba(12,34,96,.05)}.layout{display:grid;grid-template-columns:286px 1fr;min-height:calc(100vh - 82px)}.side{padding:24px 20px;border-right:1px solid var(--line);background:rgba(255,255,255,.72)}.nav button{width:100%;display:flex;gap:12px;align-items:center;text-align:left;margin-bottom:10px;padding:15px 16px;border-radius:15px;background:transparent;color:#30416f;font-weight:800}.nav button.active,.nav button:hover{background:linear-gradient(135deg,var(--blue),#235bd5);color:#fff;box-shadow:0 12px 25px rgba(31,86,207,.25)}.sidecard{margin-top:28px;border-radius:22px;padding:20px;color:#fff;background:linear-gradient(135deg,var(--blue),var(--cyan));box-shadow:var(--shadow);position:relative;overflow:hidden}.sidecard:after{content:"";position:absolute;width:180px;height:180px;border-radius:999px;background:rgba(255,255,255,.17);right:-70px;bottom:-70px}.main{padding:28px;max-width:1500px;width:100%;margin:auto}.hero{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:22px}.hero h1{margin:0;font-size:31px;color:var(--navy)}.hero p{margin:7px 0 0;color:var(--muted);font-weight:600}.grid{display:grid;gap:18px}.kpis{grid-template-columns:repeat(5,minmax(160px,1fr))}.card{background:rgba(255,255,255,.86);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px}.kpi{display:flex;gap:14px;align-items:center}.ico{width:54px;height:54px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,#e7f5ff,#dce7ff);font-size:25px;color:var(--blue)}.kpi small{color:var(--muted);font-weight:800}.kpi strong{font-size:31px;color:var(--blue);display:block}.dashgrid{grid-template-columns:1.05fr 1.35fr 1.25fr;align-items:stretch}.sectiontitle{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}.sectiontitle h2{font-size:18px;margin:0;color:var(--navy)}.gauge{width:250px;height:250px;border-radius:999px;margin:15px auto;display:grid;place-items:center;background:conic-gradient(var(--cyan) 0 var(--deg,280deg),#edf1f8 0 360deg);position:relative}.gauge:after{content:"";position:absolute;inset:22px;border-radius:inherit;background:#fff}.gauge div{position:relative;z-index:1;text-align:center}.gauge b{font-size:58px;color:var(--navy)}.gauge span{display:block;color:var(--green);font-size:20px;font-weight:900}.btn{border-radius:14px;padding:13px 18px;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;font-weight:900;box-shadow:0 12px 23px rgba(31,86,207,.22)}.btn.secondary{background:#fff;color:var(--blue);border:1px solid var(--line);box-shadow:none}.btn.danger{background:linear-gradient(135deg,#d72d50,#ff6b48)}.btn.green{background:linear-gradient(135deg,#00a770,#0bd2a7)}.formgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}label{font-size:12px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.6px}input,select,textarea{width:100%;margin-top:7px;border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff;color:var(--text);outline:none}textarea{min-height:90px}.companylist{display:grid;gap:14px}.company{border:1px solid var(--line);border-radius:18px;padding:16px;background:#fff}.company h3{margin:0 0 5px}.links{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.linkbox{background:#f6f9ff;border:1px solid var(--line);border-radius:14px;padding:12px;word-break:break-all;font-size:12px;color:#30416f}.linkbox b{display:block;margin-bottom:5px;color:var(--blue)}.chartbar{height:12px;border-radius:999px;background:#edf1f8;overflow:hidden}.chartbar i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));width:50%}.radar{min-height:255px;display:grid;place-items:center}.radar svg{width:100%;max-width:380px}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:12px;border-bottom:1px solid var(--line);font-size:13px;text-align:left}.table th{color:var(--muted);font-size:11px;text-transform:uppercase}.status{padding:7px 10px;border-radius:999px;background:#eaf3ff;color:var(--blue);font-weight:900;font-size:12px;display:inline-block}.heat{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin:14px 0}.heat div{height:70px;border-radius:12px;display:grid;place-items:center;color:#fff;font-weight:900}.h1{background:#2abb87}.h2{background:#ead85d}.h3{background:#ffad43}.h4{background:#ff744d}.h5{background:#e93a59}.question{padding:18px;border:1px solid var(--line);border-radius:18px;background:#fff;margin-bottom:14px}.question h3{margin:0 0 8px;font-size:16px}.scale{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.scale label{cursor:pointer;text-transform:none;letter-spacing:0;font-size:12px;color:#30416f;background:#f4f8ff;border:1px solid var(--line);border-radius:13px;padding:10px;text-align:center}.scale input{display:none}.scale label:has(input:checked){background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;border-color:transparent}.fullpage{min-height:100vh;display:grid;place-items:center;padding:22px;background:radial-gradient(circle at top left,#dff6ff,transparent 38%),linear-gradient(135deg,#f7fbff,#eef6ff)}.formwrap{width:min(840px,100%)}.thanks{text-align:center;padding:60px}.cert{border:2px solid #dbe9ff;background:linear-gradient(135deg,#fff,#f4fbff);border-radius:24px;text-align:center;padding:24px}.seal{width:140px;height:140px;border-radius:999px;border:7px solid #d5e9ff;margin:0 auto 10px;display:grid;place-items:center;background:#fff;box-shadow:var(--shadow)}.seal img{width:86px}.footerbar{margin-top:18px;border-radius:22px;padding:22px;background:linear-gradient(135deg,var(--blue),#3029a8);color:#fff;display:flex;justify-content:space-between;gap:20px;align-items:center}.small{font-size:12px;color:var(--muted)}@media(max-width:1050px){.layout{grid-template-columns:1fr}.side{display:none}.kpis,.dashgrid,.formgrid,.links{grid-template-columns:1fr}.top{height:auto}.hero,.footerbar{flex-direction:column;align-items:flex-start}.main{padding:18px}.brand img{width:48px;height:48px}}
@media print{.top,.side,.btn,.footerbar{display:none!important}.layout{display:block}.main{padding:0}.card{box-shadow:none;break-inside:avoid}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const API=''; let NET_ORIGIN=null; let ACTIVE_QS=null;
const DEFAULT_QUESTIONS=[
 {dim:'Carga de trabalho',text:'Tenho volume de trabalho compatível com o tempo disponível.',direction:'positive'},
 {dim:'Jornada',text:'Minha jornada permite descanso e recuperação adequados.',direction:'positive'},
 {dim:'Liderança',text:'Recebo orientação clara, respeito e apoio da liderança.',direction:'positive'},
 {dim:'Comunicação',text:'As informações importantes chegam de forma clara e no tempo certo.',direction:'positive'},
 {dim:'Assédio',text:'O ambiente é respeitoso, sem constrangimentos, humilhações ou discriminação.',direction:'positive'},
 {dim:'Autonomia',text:'Tenho autonomia adequada para organizar minhas atividades.',direction:'positive'},
 {dim:'Reconhecimento',text:'Sinto que meu trabalho é reconhecido e valorizado.',direction:'positive'},
 {dim:'Suporte',text:'Tenho apoio emocional e operacional quando enfrento dificuldades.',direction:'positive'},
 {dim:'Conflitos',text:'Conflitos são tratados de forma justa e segura.',direction:'positive'},
 {dim:'Segurança psicológica',text:'Sinto segurança para falar sobre problemas sem medo de retaliação.',direction:'positive'}
];
const $=s=>document.querySelector(s); const app=$('#app');
async function networkOrigin(){ if(NET_ORIGIN) return NET_ORIGIN; try{const info=await fetch('/api/server-info').then(r=>r.json()); NET_ORIGIN=info.preferredUrl||location.origin;}catch(e){NET_ORIGIN=location.origin} return NET_ORIGIN; }
async function api(path, opts={}){ const r=await fetch(API+path,{headers:{'Content-Type':'application/json'},...opts}); const j=await r.json().catch(()=>({})); if(!r.ok) throw new Error(j.error||'Erro'); return j; }
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function copy(txt){navigator.clipboard?.writeText(txt); alert('Link copiado!')}
function route(){ const p=location.pathname; if(p.startsWith('/f/')) return renderForm(p.split('/').pop()); if(p.startsWith('/d/')) return renderDashboardOnly(p.split('/').pop()); return renderAdmin(); }
function shell(content, active='visao'){
 app.innerHTML=`<div class="app"><header class="top"><div class="brand"><img src="/logo.png"><div><b>GESTÃO RH</b><span>CONSULTORIA</span></div></div><div style="display:flex;gap:10px;align-items:center"><span class="pill">Servidor em rede local</span><button class="btn secondary" onclick="location.href='/'">Painel Gestão RH</button></div></header><div class="layout"><aside class="side"><div class="nav"><button class="${active==='visao'?'active':''}" onclick="showAdminDash()">⌂ Visão Geral</button><button class="${active==='empresas'?'active':''}" onclick="showCompanies()">▣ Empresas e links</button><button class="${active==='perguntas'?'active':''}" onclick="showQuestions()">✎ Perguntas</button><button class="${active==='respostas'?'active':''}" onclick="showResponses()">☑ Respostas</button><button onclick="exportData()">⇩ Backup JSON</button></div><div class="sidecard"><h3>Conformidade com a NR-1</h3><p>Agora os questionários são versionados: links antigos mantêm as mesmas perguntas e notas.</p></div></aside><main class="main" id="main">${content}</main></div></div>`;
}
function qScore(val, q){ const v=Number(val)||0; if(q?.direction==='negative') return Math.round((6-v)/5*100); return Math.round(v/5*100); }
function scoreResponses(responses, questionSet){
 const qs=questionSet?.questions||DEFAULT_QUESTIONS; if(!responses.length) return {score:0,dims:{},risk:'Sem dados'};
 const dims={}; qs.forEach(q=>dims[q.dim]=[]);
 responses.forEach(r=>{(r.answers||[]).forEach((a,i)=>{const q=qs[i]; if(q) dims[q.dim].push(qScore(a,q));})});
 const dimScores={}; Object.keys(dims).forEach(k=>{const arr=dims[k]; dimScores[k]=arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):0;});
 const vals=Object.values(dimScores).filter(v=>!isNaN(v)); const score=vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0;
 return {score,dims:dimScores,risk:score>=80?'Baixo':score>=60?'Moderado':score>=40?'Alto':'Crítico'};
}
function maturity(score){ if(score>=90)return 'Diamante'; if(score>=80)return 'Ouro'; if(score>=65)return 'Prata'; if(score>=50)return 'Bronze'; return 'Alerta Vermelho'; }
async function getActiveQS(){ if(ACTIVE_QS) return ACTIVE_QS; ACTIVE_QS=await api('/api/question-set/active'); return ACTIVE_QS; }
async function renderAdmin(){ shell(`<div class="hero"><div><h1>Olá, Gestão RH! 👋</h1><p>Administre empresas, links, questionários versionados e dashboards privados.</p></div><button class="btn" onclick="showCompanies()">+ Cadastrar empresa</button></div><div id="adminContent"></div>`); showAdminDash(); }
async function showAdminDash(){
 const companies=await api('/api/companies'); const responses=await api('/api/responses'); const qs=await getActiveQS();
 $('#main').innerHTML=`<div class="hero"><div><h1>Visão Geral</h1><p>Resumo dos clientes e versão atual do questionário.</p></div><button class="btn secondary" onclick="showQuestions()">Editar perguntas</button></div><div class="grid kpis"><div class="card kpi"><div class="ico">🏢</div><div><small>Empresas</small><strong>${companies.length}</strong></div></div><div class="card kpi"><div class="ico">📝</div><div><small>Respostas</small><strong>${responses.length}</strong></div></div><div class="card kpi"><div class="ico">🔒</div><div><small>Questionário atual</small><strong>v${qs.version}</strong></div></div><div class="card kpi"><div class="ico">❓</div><div><small>Perguntas atuais</small><strong>${qs.questions.length}</strong></div></div><div class="card kpi"><div class="ico">🏅</div><div><small>Produto</small><strong>NR-1</strong></div></div></div><div class="card" style="margin-top:18px"><div class="sectiontitle"><h2>Clientes recentes</h2><button class="btn secondary" onclick="showCompanies()">Ver links</button></div><table class="table"><thead><tr><th>Empresa</th><th>Versão das perguntas</th><th>Respostas</th><th>Dashboard</th></tr></thead><tbody>${companies.map(c=>`<tr><td><b>${esc(c.name)}</b><br><span class="small">${esc(c.segment||'')}</span></td><td>${esc(c.questionSetId||'-')}</td><td>${responses.filter(r=>r.companyId===c.id).length}</td><td><button class="btn secondary" onclick="location.href='/d/${c.dashToken}'">Abrir</button></td></tr>`).join('')||'<tr><td colspan="4">Nenhuma empresa cadastrada ainda.</td></tr>'}</tbody></table></div>`;
}
async function showCompanies(){
 const companies=await api('/api/companies'); const base=await networkOrigin(); const qs=await getActiveQS();
 shell('', 'empresas');
 $('#main').innerHTML=`<div class="hero"><div><h1>Empresas e links exclusivos</h1><p>Cada empresa criada recebe uma cópia travada do questionário atual.</p><p class="small">Questionário usado em novas empresas: <b>v${qs.version}</b> • ${qs.questions.length} perguntas. Links já saem com IP: <b>${base}</b></p></div></div><div class="card"><div class="sectiontitle"><h2>Cadastrar empresa cliente</h2><span class="status">Usará perguntas v${qs.version}</span></div><div class="formgrid"><div><label>Nome da empresa</label><input id="cname" placeholder="Ex: Empresa X LTDA"></div><div><label>CNPJ</label><input id="ccnpj" placeholder="Opcional"></div><div><label>Segmento</label><input id="cseg" placeholder="Ex: Comércio, Saúde, Indústria"></div><div><label>Cidade/UF</label><input id="ccity" placeholder="Ex: Salvador/BA"></div><div><label>Nº de colaboradores</label><input id="cemp" placeholder="Ex: 120"></div><div style="display:flex;align-items:end"><button class="btn" onclick="createCompany()">Gerar links da empresa</button></div></div></div><div class="companylist" style="margin-top:18px">${companies.map(c=>companyCard(c,base)).join('')||'<div class="card">Cadastre a primeira empresa para gerar os links.</div>'}</div>`;
}
function companyCard(c,base){ const fl=`${base}/f/${c.formToken}`, dl=`${base}/d/${c.dashToken}`; return `<div class="company"><h3>${esc(c.name)}</h3><span class="small">${esc(c.segment||'Segmento não informado')} • ${esc(c.city||'')} • Questionário travado: ${esc(c.questionSetId||'-')}</span><div class="links"><div class="linkbox"><b>Link dos funcionários - só formulário</b>${fl}<br><br><button class="btn secondary" onclick="copy('${fl}')">Copiar link</button> <button class="btn secondary" onclick="location.href='/f/${c.formToken}'">Testar</button></div><div class="linkbox"><b>Link do patrão/gestor - só dashboard</b>${dl}<br><br><button class="btn secondary" onclick="copy('${dl}')">Copiar link</button> <button class="btn secondary" onclick="location.href='/d/${c.dashToken}'">Abrir</button></div></div></div>`; }
async function createCompany(){ try{await api('/api/companies',{method:'POST',body:JSON.stringify({name:$('#cname').value,cnpj:$('#ccnpj').value,segment:$('#cseg').value,city:$('#ccity').value,employees:$('#cemp').value})}); alert('Empresa cadastrada! Os links ficaram presos à versão atual das perguntas.'); showCompanies();}catch(e){alert(e.message)} }
async function showQuestions(){
 shell('', 'perguntas'); const data=await api('/api/question-sets'); const active=data.questionSets.find(q=>q.id===data.activeQuestionSetId)||data.questionSets.at(-1); ACTIVE_QS=active;
 $('#main').innerHTML=`<div class="hero"><div><h1>Perguntas do formulário</h1><p>Ao salvar alterações, o sistema cria uma NOVA versão. Links antigos continuam com as perguntas antigas.</p></div><span class="pill">Versão atual: v${active.version}</span></div><div class="card"><div class="sectiontitle"><h2>Editar perguntas para próximos links</h2><button class="btn secondary" onclick="addQuestion()">+ Pergunta</button></div><p class="small"><b>Importante:</b> salvar aqui não mexe nas empresas já criadas. Só novas empresas/links usarão a nova versão.</p><div id="qEditor">${active.questions.map((q,i)=>qRow(q,i)).join('')}</div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px"><button class="btn green" onclick="saveQuestionSet()">Salvar como nova versão</button><button class="btn secondary" onclick="restoreDefaultQuestions()">Restaurar padrão NR-1</button></div></div><div class="card" style="margin-top:18px"><div class="sectiontitle"><h2>Histórico de versões</h2></div><table class="table"><thead><tr><th>Versão</th><th>Data</th><th>Perguntas</th><th>Status</th></tr></thead><tbody>${data.questionSets.slice().reverse().map(q=>`<tr><td>v${q.version}</td><td>${new Date(q.createdAt).toLocaleString('pt-BR')}</td><td>${q.questions.length}</td><td>${q.id===data.activeQuestionSetId?'<span class="status">Atual</span>':'Arquivada'}</td></tr>`).join('')}</tbody></table></div>`;
}
function qRow(q,i){return `<div class="question qedit"><div class="formgrid"><div><label>Dimensão</label><input class="qdim" value="${esc(q.dim)}" placeholder="Ex: Liderança"></div><div><label>Tipo da nota</label><select class="qdir"><option value="positive" ${q.direction!=='negative'?'selected':''}>Positiva: quanto maior, melhor</option><option value="negative" ${q.direction==='negative'?'selected':''}>Risco: quanto maior, pior</option></select></div></div><label>Pergunta</label><textarea class="qtext" placeholder="Digite a pergunta">${esc(q.text)}</textarea><button class="btn danger" onclick="this.closest('.qedit').remove()">Remover</button></div>`}
function addQuestion(){ $('#qEditor').insertAdjacentHTML('beforeend', qRow({dim:'Geral',text:'',direction:'positive'},0)); }
function restoreDefaultQuestions(){ if(confirm('Substituir o editor pelo questionário padrão? Só vira oficial quando salvar.')) $('#qEditor').innerHTML=DEFAULT_QUESTIONS.map(q=>qRow(q,0)).join(''); }
async function saveQuestionSet(){
 const rows=[...document.querySelectorAll('.qedit')]; const questions=rows.map(r=>({dim:r.querySelector('.qdim').value.trim()||'Geral', text:r.querySelector('.qtext').value.trim(), direction:r.querySelector('.qdir').value})).filter(q=>q.text.length>3);
 if(questions.length<3) return alert('Cadastre pelo menos 3 perguntas.');
 if(!confirm('Salvar como NOVA versão? Empresas e links antigos continuarão sem alteração.')) return;
 try{ACTIVE_QS=null; const qs=await api('/api/question-sets',{method:'POST',body:JSON.stringify({questions})}); alert(`Nova versão criada: v${qs.version}. Novas empresas usarão essas perguntas.`); showQuestions();}catch(e){alert(e.message)}
}
async function showResponses(){
 shell('', 'respostas'); const companies=await api('/api/companies'); const responses=await api('/api/responses');
 $('#main').innerHTML=`<div class="hero"><div><h1>Respostas recebidas</h1><p>Lista administrativa de respostas anônimas.</p></div></div><div class="card"><table class="table"><thead><tr><th>Data</th><th>Empresa</th><th>Setor</th><th>Modalidade</th><th>Versão</th><th>Média bruta</th></tr></thead><tbody>${responses.slice().reverse().map(r=>{const c=companies.find(x=>x.id===r.companyId)||{}; const avg=Math.round((r.answers||[]).reduce((a,b)=>a+Number(b),0)/(r.answers?.length||1)/5*100); return `<tr><td>${new Date(r.createdAt).toLocaleString('pt-BR')}</td><td>${esc(c.name||'-')}</td><td>${esc(r.sector)}</td><td>${esc(r.workMode)}</td><td>${esc(r.questionSetId||c.questionSetId||'-')}</td><td>${avg}%</td></tr>`}).join('')||'<tr><td colspan="6">Nenhuma resposta ainda.</td></tr>'}</tbody></table></div>`;
}
async function renderForm(formToken){
 let c; try{c=await api('/api/company/form/'+formToken)}catch(e){app.innerHTML=`<div class="fullpage"><div class="card">Link não encontrado.</div></div>`;return}
 const qs=c.questionSet; const labels=['Nunca','Raramente','Às vezes','Frequentemente','Sempre'];
 app.innerHTML=`<div class="fullpage"><div class="formwrap"><div class="card"><div class="brand"><img src="/logo.png"><div><b>GESTÃO RH</b><span>CONSULTORIA</span></div></div><hr style="border:0;border-top:1px solid var(--line);margin:18px 0"><h1>Pesquisa Psicossocial NR-1</h1><p style="color:var(--muted);font-weight:700">Empresa: <b>${esc(c.name)}</b></p><p>Suas respostas são anônimas e serão usadas apenas para diagnóstico coletivo. O gestor verá somente os resultados consolidados.</p><div class="formgrid"><div><label>Setor</label><input id="sector" placeholder="Ex: Administrativo, Operação"></div><div><label>Modalidade de trabalho</label><select id="workMode"><option>Presencial</option><option>Híbrido</option><option>Remoto</option><option>Externo</option></select></div></div><div id="questions" style="margin-top:18px">${qs.questions.map((q,i)=>`<div class="question"><h3>${i+1}. ${esc(q.text)}</h3><p class="small">Dimensão: ${esc(q.dim)}</p><div class="scale">${[1,2,3,4,5].map(v=>`<label><input type="radio" name="q${i}" value="${v}">${v}<br><small>${labels[v-1]}</small></label>`).join('')}</div></div>`).join('')}</div><button class="btn green" style="width:100%;font-size:17px" onclick="submitForm('${formToken}',${qs.questions.length})">Enviar respostas</button></div></div></div>`;
}

v></div><ol>${low.map(([k,v])=>`<li><b>${esc(k)}</b> — ${v}%</li>`).join('')||'<li>Aguardando dados.</li>'}</ol></div></div><div class="grid" style="grid-template-columns:1.4fr .8fr;margin-top:18px"><div class="card"><div class="sectiontitle"><h2>Plano de Ação 5W2H sugerido</h2></div><table class="table"><thead><tr><th>Ação</th><th>O quê?</th><th>Quem?</th><th>Quando?</th><th>Status</th></tr></thead><tbody>${low.map(([k,v])=>`<tr><td>Melhorar ${esc(k)}</td><td>Executar intervenção preventiva na dimensão ${esc(k.toLowerCase())}</td><td>RH + Liderança</td><td>30 dias</td><td><span class="status">Planejada</span></td></tr>`).join('')||'<tr><td colspan="5">Aguardando respostas para gerar plano.</td></tr>'}</tbody></table></div><div class="card cert"><h2>Selo de Maturidade Psicossocial NR-1</h2><div class="seal"><img src="/logo.png"></div><h1>${maturity(s.score)}</h1><p>Pontuação: ${s.score}/100</p><div class="chartbar"><i style="width:${s.score}%"></i></div></div></div>`; }
