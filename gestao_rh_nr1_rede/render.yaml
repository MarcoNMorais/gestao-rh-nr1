services:
  - type: web
    name: gestao-rh-nr1
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /var/data
    disk:
      name: gestao-rh-dados
      mountPath: /var/data
      sizeGB: 1
